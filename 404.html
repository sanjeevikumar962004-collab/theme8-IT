<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>404 Page Not Found - Stackly IT Solutions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* Shared Styles */
        :root { --base: #161616; --base-opp: #FAF7F6; --base-tint: #F3F1F0; --font-main: 'Manrope', sans-serif; }
        [data-theme="dark"] { --base: #FAF7F6; --base-opp: #161616; --base-tint: #222222; }

        /* ==========================================
           LOADER
           ========================================== */
        .loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #141218;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .iconLoaderProgress {
            display: flex;
            align-items: center;
            justify-content: center;
            animation: rotateLoader 2s linear infinite;
            position: relative;
            width: 240px; height: 240px;
        }

        .iconLoaderProgress svg {
            stroke-width: 16px;
            fill: none;
            transform-origin: center;
            z-index: 999;
            position: absolute;
        }

        .iconLoaderProgressFirst circle {
            animation: circleFirst 3s ease-in-out infinite;
            stroke-dasharray: 628, 628;
            stroke-dashoffset: 0;
            stroke: #7c57f4;
            stroke-linecap: round;
        }

        .iconLoaderProgressSecond {
            transform: rotate(-14deg);
        }

        .iconLoaderProgressSecond circle {
            animation: circleSecond 3s ease-in-out infinite;
            stroke-dasharray: 628, 628;
            stroke-dashoffset: 0;
            stroke: #bfb2f7;
            stroke-linecap: round;
        }

        @keyframes circleFirst { from, to { stroke-dashoffset: 50; } 50% { stroke-dashoffset: 625; } }
        @keyframes circleSecond { from, to { stroke-dashoffset: -625; } 50% { stroke-dashoffset: -50; } }
        @keyframes rotateLoader { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-main); background-color: var(--base-opp); color: var(--base); -webkit-font-smoothing: antialiased; transition: background-color 0.4s ease, color 0.4s ease; overflow: hidden; }
        a { color: inherit; text-decoration: none; }
        
        /* Header */
        .mxd-header { position: fixed; top: 0; left: 0; width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1001; }
        .mxd-logo { display: flex; align-items: center; gap: 15px; font-weight: 800; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; }
        .mxd-color-switcher { background: transparent; border: 2px solid var(--base); width: 44px; height: 24px; border-radius: 20px; position: relative; cursor: pointer; }
        .mxd-color-switcher::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: var(--base); border-radius: 50%; transition: transform 0.3s ease; }
        [data-theme="dark"] .mxd-color-switcher::after { transform: translateX(20px); }
        
        /* Logo theme adjustment */
        .mxd-logo img, .stackly-logo-img {
            transition: filter 0.4s ease;
        }
        [data-theme="light"] .mxd-logo img, [data-theme="light"] .stackly-logo-img {
            filter: brightness(0);
        }
        [data-theme="dark"] .mxd-logo img, [data-theme="dark"] .stackly-logo-img {
            filter: brightness(1);
        }

        /* 404 Hero Section */
        .error-wrapper {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; position: relative; z-index: 1; padding: 0 20px;
        }
        
        .huge-404 {
            font-size: clamp(8rem, 25vw, 18rem);
            font-weight: 800; line-height: 1; letter-spacing: -0.05em;
            color: transparent; -webkit-text-stroke: 2px var(--base);
            opacity: 0.15; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            z-index: -1; user-select: none;
        }
        [data-theme="dark"] .huge-404 { opacity: 0.1; }

        .error-title { font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 800; margin-bottom: 1rem; }
        .error-desc { font-size: clamp(1.1rem, 2vw, 1.5rem); opacity: 0.6; max-width: 500px; margin: 0 auto 3rem; line-height: 1.5; }

        .btn-violet {
            background-color: #8b5cf6; color: #ffffff; border: none; padding: 18px 45px; border-radius: 100px;
            font-size: 1.15rem; font-weight: 700; cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: inline-flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-violet:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(139, 92, 246, 0.3); }

        /* Floating elements for visual flair */
        .float-el { position: absolute; border-radius: 50%; background: #8b5cf6; filter: blur(60px); opacity: 0.2; z-index: -2; pointer-events: none; }
        .f1 { width: 300px; height: 300px; top: 10%; left: 15%; animation: float 10s ease-in-out infinite alternate; }
        .f2 { width: 400px; height: 400px; bottom: -10%; right: 10%; animation: float 12s ease-in-out infinite alternate-reverse; }
        
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }

        @media (max-width: 576px) { .mxd-header { padding: 15px; } .btn-violet { padding: 15px 35px; } }
        .anim-element { visibility: hidden; }
    </style>
</head>
<body>
    <header class="mxd-header">
        <a href="index.html" class="mxd-logo">
            <img src="images/whitelogo.webp" alt="Stackly Logo" style="width:100px;height:100px;object-fit:contain;border-radius:8px;margin:-25px 0;">
        </a>
        <button id="color-switcher" class="mxd-color-switcher" type="button"></button>
    </header>

    <div class="float-el f1"></div>
    <div class="float-el f2"></div>

    <main class="error-wrapper">
        <div class="huge-404">404</div>
        <div class="anim-element">
            <h1 class="error-title">Looks like you're lost.</h1>
        </div>
        <div class="anim-element">
            <p class="error-desc">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        </div>
        <div class="anim-element">
            <a href="index.html" class="btn-violet">
                <i class="ph-bold ph-arrow-left"></i> Back to Home
            </a>
        </div>
    </main>

    <script src="./min.js"></script>
    <script>
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);

        document.getElementById('color-switcher').addEventListener('click', () => {
            const theme = document.documentElement.getAttribute('data-theme');
            const newTheme = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // 1. Initial Loader & Entrance Animation
        const initTl = gsap.timeline();

        function playIntro() {
            if (document.body.dataset.introPlayed) return;
            document.body.dataset.introPlayed = true;

            initTl.to('#loader', { 
                opacity: 0, duration: 0.8, delay: 2, ease: "power2.inOut", 
                onComplete: () => {
                    const ldr = document.getElementById('loader');
                    if (ldr) {
                        ldr.style.display = 'none';
                        ldr.style.pointerEvents = 'none';
                    }
                } 
            })
            .from('.huge-404', { scale: 0.8, opacity: 0, duration: 1.5, ease: "power3.out" }, "-=0.3")
            .fromTo('.anim-element', 
              { autoAlpha: 0, y: 30 }, 
              { autoAlpha: 1, y: 0, duration: 0.8, stagger: 0.15, ease: "power2.out" }, "-=1"
            );
        }

        // Trigger loader
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            setTimeout(playIntro, 1);
        } else {
            document.addEventListener('DOMContentLoaded', playIntro);
        }
        window.addEventListener('load', playIntro);
        setTimeout(playIntro, 2500); // Safety timeout

        // Simple Mouse Parallax on the huge 404
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 30;
            const y = (e.clientY / window.innerHeight - 0.5) * 30;
            gsap.to('.huge-404', { x: x, y: y, duration: 1, ease: "power2.out" });
        });
    </script>
</body>
</html>
