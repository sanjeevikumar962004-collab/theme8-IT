<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Stackly IT Solutions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* Shared Styles */
        :root { --base: #161616; --base-opp: #FAF7F6; --base-tint: #F3F1F0; --font-main: 'Manrope', sans-serif; --radius-l: 24px; }
        [data-theme="dark"] { --base: #FAF7F6; --base-opp: #161616; --base-tint: #222222; }

        /* ==========================================
           LOADER
           ========================================== */
        .loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #141218;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .iconLoaderProgress {
            display: flex;
            align-items: center;
            justify-content: center;
            animation: rotateLoader 2s linear infinite;
            position: relative;
            width: 240px; height: 240px;
        }

        .iconLoaderProgress svg {
            stroke-width: 16px;
            fill: none;
            transform-origin: center;
            z-index: 999;
            position: absolute;
        }

        .iconLoaderProgressFirst circle {
            animation: circleFirst 3s ease-in-out infinite;
            stroke-dasharray: 628, 628;
            stroke-dashoffset: 0;
            stroke: #7c57f4;
            stroke-linecap: round;
        }

        .iconLoaderProgressSecond {
            transform: rotate(-14deg);
        }

        .iconLoaderProgressSecond circle {
            animation: circleSecond 3s ease-in-out infinite;
            stroke-dasharray: 628, 628;
            stroke-dashoffset: 0;
            stroke: #bfb2f7;
            stroke-linecap: round;
        }

        @keyframes circleFirst { from, to { stroke-dashoffset: 50; } 50% { stroke-dashoffset: 625; } }
        @keyframes circleSecond { from, to { stroke-dashoffset: -625; } 50% { stroke-dashoffset: -50; } }
        @keyframes rotateLoader { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-main); background-color: var(--base-opp); color: var(--base); -webkit-font-smoothing: antialiased; transition: background-color 0.4s ease, color 0.4s ease; overflow-x: hidden; }
        a { color: inherit; text-decoration: none; }
        .t-muted { opacity: 0.6; }
        
        /* Header */
        .mxd-header { position: fixed; top: 0; left: 0; width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1001; background: var(--base-opp); border-bottom: 1px solid rgba(128, 128, 128, 0.1); }
        .mxd-logo { display: flex; align-items: center; gap: 15px; font-weight: 800; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; }
        .mxd-color-switcher { background: transparent; border: 2px solid var(--base); width: 44px; height: 24px; border-radius: 20px; position: relative; cursor: pointer; }
        .mxd-color-switcher::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: var(--base); border-radius: 50%; transition: transform 0.3s ease; }
        [data-theme="dark"] .mxd-color-switcher::after { transform: translateX(20px); }

        /* Logo theme adjustment */
        .mxd-logo img, .stackly-logo-img {
            transition: filter 0.4s ease;
        }
        [data-theme="light"] .mxd-logo img, [data-theme="light"] .stackly-logo-img {
            filter: brightness(0);
        }
        [data-theme="dark"] .mxd-logo img, [data-theme="dark"] .stackly-logo-img {
            filter: brightness(1);
        }

        /* Auth Card */
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 120px 20px 60px; }
        .auth-card { background: var(--base-tint); width: 100%; max-width: 480px; padding: 4rem 3rem; border-radius: var(--radius-l); box-shadow: 0 30px 60px rgba(0,0,0,0.05); text-align: center; border: 1px solid rgba(128,128,128,0.1); }
        .auth-icon { font-size: 3.5rem; color: #8b5cf6; margin-bottom: 1rem; }
        .auth-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 0.5rem; }

        /* Floating Inputs */
        .minimal-input-group { position: relative; margin-top: 3rem; margin-bottom: 2rem; text-align: left; }
        .minimal-input { width: 100%; background: transparent; border: none; border-bottom: 2px solid rgba(128,128,128,0.2); padding: 10px 0; font-size: 1.1rem; color: var(--base); outline: none; transition: border-color 0.3s ease; }
        .minimal-input:focus { border-bottom-color: #8b5cf6; }
        .minimal-label { position: absolute; left: 0; top: 10px; font-size: 1.1rem; color: var(--base); opacity: 0.5; pointer-events: none; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .minimal-input:focus ~ .minimal-label, .minimal-input:not(:placeholder-shown) ~ .minimal-label { top: -20px; font-size: 0.8rem; font-weight: 700; color: #8b5cf6; opacity: 1; text-transform: uppercase; letter-spacing: 1px; }
        .error-msg { position: absolute; left: 0; bottom: -20px; font-size: 0.8rem; font-weight: 600; color: #ef4444; opacity: 0; transition: opacity 0.3s ease; }

        /* Buttons */
        .btn-violet { background-color: #8b5cf6; color: #ffffff; border: none; width: 100%; padding: 16px; border-radius: 100px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 2rem; }
        .btn-violet:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(139, 92, 246, 0.3); }
        .spinner { animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .auth-links { margin-top: 2rem; font-size: 0.95rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .auth-links a { color: var(--base); transition: color 0.3s ease; }
        .auth-links a:hover { color: #8b5cf6; }

        @media (max-width: 576px) { .mxd-header { padding: 15px; } .auth-card { padding: 3rem 2rem; border-radius: 20px; } }
        .anim-fade-up { opacity: 0; transform: translateY(30px); }
    </style>
</head>
<body style="overflow-x: hidden;">

    <!-- Loader -->
    <div id="loader" class="loader">
        <figure class="iconLoaderProgress">
            <svg class="iconLoaderProgressFirst" width="240" height="240">
                <circle cx="120" cy="120" r="100"></circle>
            </svg>
            <svg class="iconLoaderProgressSecond" width="240" height="240">
                <circle cx="120" cy="120" r="100"></circle>
            </svg>
        </figure>
    </div>
    <header class="mxd-header">
        <a href="index.html" class="mxd-logo">
            <img src="images/whitelogo.webp" alt="Stackly Logo" style="width:100px;height:100px;object-fit:contain;border-radius:8px;margin:-25px 0;">
        </a>
        <button id="color-switcher" class="mxd-color-switcher" type="button"></button>
    </header>

    <main class="auth-wrapper">
        <div class="auth-card anim-fade-up">
            <i class="ph-fill ph-lock-key auth-icon"></i>
            <h1 class="auth-title">Reset Password</h1>
            <p class="t-muted">Enter your registered email and we'll send you instructions to reset your password.</p>

            <form id="resetForm" novalidate>
                <div class="minimal-input-group">
                    <input type="email" id="email" class="minimal-input" placeholder=" " required>
                    <label for="email" class="minimal-label">Email Address</label>
                    <span class="error-msg" id="email-error">Invalid email address</span>
                </div>

                <button type="submit" class="btn-violet" id="submitBtn">
                    <i class="ph-bold ph-spinner spinner" id="btnSpinner"></i>
                    <span id="btnText">Send Reset Link</span>
                </button>
            </form>

            <div class="auth-links">
                <a href="login.html"><i class="ph-bold ph-arrow-left"></i> Back to Login</a>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);

        document.getElementById('color-switcher').addEventListener('click', () => {
            const theme = document.documentElement.getAttribute('data-theme');
            const newTheme = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
        // 2. Initial Loader & Entrance Animation
        const initTl = gsap.timeline();

        function playIntro() {
            if (document.body.dataset.introPlayed) return;
            document.body.dataset.introPlayed = true;

            initTl.to('#loader', { 
                opacity: 0, duration: 0.8, delay: 2, ease: "power2.inOut", 
                onComplete: () => {
                    const ldr = document.getElementById('loader');
                    if (ldr) {
                        ldr.style.display = 'none';
                        ldr.style.pointerEvents = 'none';
                    }
                } 
            })
            .to('.anim-fade-up', { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" }, "-=0.3");
        }

        // Trigger loader
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            setTimeout(playIntro, 1);
        } else {
            document.addEventListener('DOMContentLoaded', playIntro);
        }
        window.addEventListener('load', playIntro);
        setTimeout(playIntro, 2500); // Safety timeout

        const form = document.getElementById('resetForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault(); 
            const errorEl = document.getElementById('email-error');
            const inputEl = document.getElementById('email');
            const email = inputEl.value.trim();
            
            errorEl.style.opacity = '0'; inputEl.style.borderBottomColor = '';

            if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
                errorEl.textContent = 'Please enter a valid email address';
                errorEl.style.opacity = '1'; inputEl.style.borderBottomColor = '#ef4444';
            } else {
                const btnText = document.getElementById('btnText');
                const btnSpinner = document.getElementById('btnSpinner');
                btnText.textContent = `Sending...`; btnSpinner.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = '404.html';
                }, 1500);
            }
        });
    </script>
</body>
</html>
